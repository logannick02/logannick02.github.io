<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1DSDTZ21T1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-1DSDTZ21T1');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Logan Caraway</title>
</head>

<body>
    <div class="terminal-window">
        <div class="terminal-navbar">
            <div class="left-nav"> 
                lshell
            </div>
            <div class="right-nav">
            </div>
        </div>

        <div class="terminal-body">
            <span class="top-space"></span>

            <div id="terminal-output" class="output">
                <p>Welcome to lshell, a portfolio for Logan Caraway</p>
                <br>
                <p>Type <span style="color: #FCEEA7">'help'</span> for a list of commands</p>
                <br>
                <!--more lines will be appended (or removed entirely) depending on user commands-->               
            </div>
            
            <div id="line">
                <div class="terminal-line">
                    <span id="prompt">guest@lshell:~$</span>
                    
                    <span class="input-wrapper">
                        <span id="typed-text"></span>
                        <span class="cursor"></span>
                    </span>
                    
                    <input id="hidden" type="text" autofocus autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                </div>
            </div>

            <div id="scroll-anchor"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
