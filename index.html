<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Logan Caraway</title>
</head>

<body>
    <div class="terminal-window">
        <div class="terminal-navbar">
            <div class="left-nav"> 
                lshell
            </div>
            <div class="right-nav">
            </div>
        </div>

        <div class="terminal-body">
            <div class="output">
                <p>Welcome to lshell, a portfolio for Logan Caraway</p>
                <br>
                <p>Type 'help' for a list of commands</p>
                <br>

                <div class="terminal-line">
                    <span class="prompt">guest@lshell:~$</span>
                    
                    <span class="input-wrapper">
                        <span id="typed-text">input</span>
                        <span class="cursor"></span>
                    </span>
                    
                    <input id=hidden type="text" autofocus>
                </div>                
            </div>
        </div>
    </div>
</body>
</html>
